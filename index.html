    <style>

            text-decoration: none;

            border-radius: 12px;

        }

            justify-content: center;
            flex-wrap: wrap;
        }

        .gallery img {
            width: 250px;
            margin: 10px;
            border-radius: 10px;
        }

        footer {
            background: #2e7d32;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }
